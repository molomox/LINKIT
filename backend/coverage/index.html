<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

d","src","adapters","websocket","mod.rs"],"content":"use axum::{\n    extract::{\n        ws::{Message, WebSocket, WebSocketUpgrade},\n        Path, State,\n    },\n    response::Response,\n    routing::get,\n    Router,\n};\nuse futures::{sink::SinkExt, stream::StreamExt};\nuse serde::{Deserialize, Serialize};\nuse std::{\n    collections::HashMap,\n    sync::Arc,\n};\nuse tokio::sync::{broadcast, RwLock};\n\n// Messages ENTRANTS du frontend (sans message_id car pas encore créé)\n#[derive(Debug, Clone, Serialize, Deserialize)]\n#[serde(tag = \"type\")]\npub enum IncomingWsMessage {\n    #[serde(rename = \"new_message\")]\n    NewMessage {\n        content: String,\n        user_id: String,\n        username: String,\n        channel_id: String,\n        #[serde(skip_serializing_if = \"Option::is_none\")]\n        server_id: Option\u003cString\u003e,\n    },\n    #[serde(rename = \"typing\")]\n    Typing {\n        user_id: String,\n        username: String,\n        channel_id: String,\n    },\n    #[serde(rename = \"ping\")]\n    Ping,\n}\n\n// Messages SORTANTS vers le frontend (avec message_id généré)\n#[derive(Debug, Clone, Serialize, Deserialize)]\n#[serde(tag = \"type\")]\npub enum WsMessage {\n    #[serde(rename = \"new_message\")]\n    NewMessage {\n        message_id: String,\n        content: String,\n        user_id: String,\n        username: String,\n        channel_id: String,\n        create_at: String,\n    },\n    #[serde(rename = \"user_joined\")]\n    UserJoined {\n        user_id: String,\n        username: String,\n        server_id: String,\n    },\n    #[serde(rename = \"user_left\")]\n    UserLeft {\n        user_id: String,\n        username: String,\n        server_id: String,\n    },\n    #[serde(rename = \"typing\")]\n    Typing {\n        user_id: String,\n        username: String,\n        channel_id: String,\n    },\n    #[serde(rename = \"ping\")]\n    Ping,\n    #[serde(rename = \"pong\")]\n    Pong,\n}\n\n// État partagé pour gérer les connexions WebSocket\npub type Clients = Arc\u003cRwLock\u003cHashMap\u003cString, broadcast::Sender\u003cString\u003e\u003e\u003e\u003e;\n\n#[derive(Clone)]\npub struct AppState {\n    pub clients: Clients,\n}\n\nimpl AppState {\n    pub fn new() -\u003e Self {\n        Self {\n            clients: Arc::new(RwLock::new(HashMap::new())),\n        }\n    }\n}\n\n// Route WebSocket pour un channel spécifique\npub async fn ws_handler(\n    ws: WebSocketUpgrade,\n    Path(channel_id): Path\u003cString\u003e,\n    State(state): State\u003cAppState\u003e,\n) -\u003e Response {\n    ws.on_upgrade(move |socket| handle_socket(socket, channel_id, state))\n}\n\n// Gestion de la connexion WebSocket\nasync fn handle_socket(socket: WebSocket, channel_id: String, state: AppState) {\n    println!(\"🟢 WebSocket connecté pour channel: {}\", channel_id);\n\n    let (mut sender, mut receiver) = socket.split();\n\n    // Créer ou récupérer le broadcaster pour ce channel\n    let tx = {\n        let mut clients = state.clients.write().await;\n        clients\n            .entry(channel_id.clone())\n            .or_insert_with(|| broadcast::channel(100).0)\n            .clone()\n    };\n\n    let mut rx = tx.subscribe();\n\n    // Variables partagées pour stocker l'identité de l'utilisateur\n    let current_user_id = Arc::new(RwLock::new(None::\u003cString\u003e));\n    let current_username = Arc::new(RwLock::new(None::\u003cString\u003e));\n\n    // Task pour envoyer les messages depuis le broadcast vers le WebSocket\n    let mut send_task = tokio::spawn(async move {\n        while let Ok(msg) = rx.recv().await {\n            if sender.send(Message::Text(msg)).await.is_err() {\n                break;\n            }\n        }\n    });\n\n    // Task pour recevoir les messages du WebSocket et les broadcaster\n    let tx_clone = tx.clone();\n    let channel_id_for_recv = channel_id.clone();\n    let user_id_clone = current_user_id.clone();\n    let username_clone = current_username.clone();\n    let mut recv_task = tokio::spawn(async move {\n        while let Some(Ok(msg)) = receiver.next().await {\n            match msg {\n                Message::Text(text) =\u003e {\n                    // Parser le message JSON ENTRANT (sans message_id)\n                    match serde_json::from_str::\u003cIncomingWsMessage\u003e(\u0026text) {\n                        Ok(incoming_msg) =\u003e {\n                            match incoming_msg {\n                                IncomingWsMessage::NewMessage { content, user_id, username, server_id, .. } =\u003e {\n                                    // Capturer l'identité de l'utilisateur au premier message\n                                    let is_first_message = {\n                                        let uid = user_id_clone.read().await;\n                                        uid.is_none()\n                                    };\n\n                                    if is_first_message {\n                                        *user_id_clone.write().await = Some(user_id.clone());\n                                        *username_clone.write().await = Some(username.clone());\n\n                                        // Broadcaster user_joined\n                                        if let Some(ref srv_id) = server_id {\n                                            let joined_msg = WsMessage::UserJoined {\n                                                user_id: user_id.clone(),\n                                                username: username.clone(),\n                                                server_id: srv_id.clone(),\n                                            };\n                                            if let Ok(json) = serde_json::to_string(\u0026joined_msg) {\n                                                let _ = tx_clone.send(json);\n                                                println!(\"👤 User joined: {} ({})\", username, user_id);\n                                            }\n                                        }\n                                    }\n\n                                    // Ignorer les messages vides (messages de présence uniquement)\n                                    if content.trim().is_empty() {\n                                        println!(\"📡 Message de présence reçu (ignoré): {}\", username);\n                                        continue;\n                                    }\n\n                                    // Sauvegarder le message en base de données\n                                    let message_result = tokio::task::spawn_blocking({\n                                        let channel_id = channel_id_for_recv.clone();\n                                        let content = content.clone();\n                                        let user_id = user_id.clone();\n                                        move || {\n                                            use crate::adapters::db::postgres_message_repository::PostgresMessageRepo;\n                                            use crate::domain::usecases::message::send_message::SendMessage;\n\n                                            let repo = PostgresMessageRepo;\n                                            let usecase = SendMessage { repo: \u0026repo };\n                                            usecase.execute(channel_id, user_id, content)\n                                        }\n                                    }).await;\n\n                                    match message_result {\n                                        Ok(Ok(saved_message)) =\u003e {\n                                            // Créer le message WS SORTANT avec les vraies données de la DB\n                                            let broadcast_msg = WsMessage::NewMessage {\n                                                message_id: saved_message.message_id,\n                                                content: saved_message.content,\n                                                user_id: saved_message.user.user_id,\n                                                username: saved_message.user.username,\n                                                channel_id: saved_message.channel_id,\n                                                create_at: saved_message.create_at,\n                                            };\n\n                                            // Broadcaster le message à tous les clients\n                                            if let Ok(json) = serde_json::to_string(\u0026broadcast_msg) {\n                                                let _ = tx_clone.send(json);\n                                            }\n                                        }\n                                        Ok(Err(e)) =\u003e {\n                                            eprintln!(\"❌ Erreur sauvegarde message: {}\", e);\n                                        }\n                                        Err(e) =\u003e {\n                                            eprintln!(\"❌ Erreur task: {}\", e);\n                                        }\n                                    }\n                                }\n                                IncomingWsMessage::Ping =\u003e {\n                                    // Répondre au ping avec un pong\n                                    let pong = WsMessage::Pong;\n                                    if let Ok(json) = serde_json::to_string(\u0026pong) {\n                                        let _ = tx_clone.send(json);\n                                    }\n                                }\n                                IncomingWsMessage::Typing { user_id, username, channel_id } =\u003e {\n                                    // Broadcaster l'événement \"typing\" aux autres clients\n                                    let typing_msg = WsMessage::Typing {\n                                        user_id,\n                                        username,\n                                        channel_id\n                                    };\n                                    if let Ok(json) = serde_json::to_string(\u0026typing_msg) {\n                                        let _ = tx_clone.send(json);\n                                    }\n                                }\n                            }\n                        }\n                        Err(e) =\u003e {\n                            eprintln!(\"❌ Erreur parsing message WebSocket: {} - Message: {}\", e, text);\n                        }\n                    }\n                }\n                Message::Close(_) =\u003e {\n                    println!(\"🔴 Client a fermé la connexion pour channel: {}\", channel_id_for_recv);\n\n                    // Broadcaster user_left si on connaît l'utilisateur\n                    let uid = user_id_clone.read().await;\n                    let uname = username_clone.read().await;\n                    if let (Some(user_id), Some(username)) = (uid.as_ref(), uname.as_ref()) {\n                        let left_msg = WsMessage::UserLeft {\n                            user_id: user_id.clone(),\n                            username: username.clone(),\n                            server_id: channel_id_for_recv.clone(),\n                        };\n                        if let Ok(json) = serde_json::to_string(\u0026left_msg) {\n                            let _ = tx_clone.send(json);\n                            println!(\"👋 User left: {} ({})\", username, user_id);\n                        }\n                    }\n\n                    break;\n                }\n                _ =\u003e {\n                    // Ignorer les autres types de messages (Binary, Ping, Pong)\n                }\n            }\n        }\n    });\n\n    // Attendre que l'une des tasks se termine\n    tokio::select! {\n        _ = (\u0026mut send_task) =\u003e recv_task.abort(),\n        _ = (\u0026mut recv_tas ing,\n        server_id: String,\n    },\n    #[serde(rename = \"user_left\")]\n    UserLeft {\n        user_id: String,\n        username: String,\n        server_id: String,\n    },\n    #[serde(rename = \"typing\")]\n    Typing {\n        user_id: String,\n        username: String,\n        channel_id: String,\n    },\n    #[serde(rename = \"ping\")]\n    Ping,\n    #[serde(rename = \"pong\")]\n    Pong,\n}\n\n// État partagé pour gérer les connexions WebSocket\npub type Clients = Arc\u003cRwLock\u003cHashMap\u003cString, broadcast::Sender\u003cString\u003e\u003e\u003e\u003e;\n\n#[derive(Clone)]\npub struct AppState {\n    pub clients: Clients,\n}\n\nimpl AppState {\n    pub fn new() -\u003e Self {\n        Self {\n            clients: Arc::new(RwLock::new(HashMap::new())),\n        }\n    }\n}\n\n// Route WebSocket pour un channel spécifique\npub async fn ws_handler(\n    ws: WebSocketUpgrade,\n    Path(channel_id): Path\u003cString\u003e,\n    State(state): State\u003cAppState\u003e,\n) -\u003e Response {\n    ws.on_upgrade(move |socket| handle_socket(socket, channel_id, state))\n}\n\n// Gestion de la connexion WebSocket\nasync fn handle_socket(socket: WebSocket, channel_id: String, state: AppState) {\n    println!(\"🟢 WebSocket connecté pour channel: {}\", channel_id);\n\n    let (mut sender, mut receiver) = socket.split();\n\n    // Créer ou récupérer le broadcaster pour ce channel\n    let tx = {\n        let mut clients = state.clients.write().await;\n        clients\n            .entry(channel_id.clone())\n            .or_insert_with(|| broadcast::channel(100).0)\n            .clone()\n    };\n\n    let mut rx = tx.subscribe();\n\n    // Variables partagées pour stocker l'identité de l'utilisateur\n    let current_user_id = Arc::new(RwLock::new(None::\u003cString\u003e));\n    let current_username = Arc::new(RwLock::new(None::\u003cString\u003e));\n\n    // Task pour envoyer les messages depuis le broadcast vers le WebSocket\n    let mut send_task = tokio:     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
