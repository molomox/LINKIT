age::Close(_) =\u003e {\r\n                    println!(\"🔴 Client a fermé la connexion pour channel: {}\", channel_id_for_recv);\r\n                    broadcast_user_left(\u0026tx_clone, \u0026user_id_clone, \u0026username_clone, \u0026channel_id_for_recv).await;\r\n                    break;\r\n                }\r\n                _ =\u003e {}\r\n            }\r\n        }\r\n    });\r\n\r\n    // Attendre que l'une des tasks se termine\r\n    tokio::select! {\r\n        _ = (\u0026mut send_task) =\u003e recv_task.abort(),\r\n        _ = (\u0026mut recv_task) =\u003e send_task.abort(),\r\n    }\r\n\r\n    // Broadcaster user_left à la déconnexion (si pas déjà fait)\r\n    broadcast_user_left(\u0026tx, \u0026current_user_id, \u0026current_username, \u0026channel_id).await;\r\n\r\n    println!(\"🔌 WebSocket déconnecté pour channel: {}\", channel_id);\r\n}\r\n\r\n/// Gérer un message texte reçu du WebSocket\r\nasync fn handle_text_message(\r\n    text: \u0026str,\r\n    tx: \u0026tokio::sync::broadcast::Sender\u003cString\u003e,\r\n    channel_id: \u0026str,\r\n    user_id: \u0026Arc\u003cRwLock\u003cOption\u003cString\u003e\u003e\u003e,\r\n    username: \u0026Arc\u003cRwLock\u003cOption\u003cString\u003e\u003e\u003e,\r\n) {\r\n    match serde_json::from_str::\u003cIncomingWsMessage\u003e(text) {\r\n        Ok(incoming_msg) =\u003e match incoming_msg {\r\n            IncomingWsMessage::NewMessage {\r\n                content,\r\n                user_id: uid,\r\n                username: uname,\r\n                server_id,\r\n                ..\r\n            } =\u003e {\r\n                handle_new_message(tx, channel_id, user_id, username, content, uid, uname, server_id).await;\r\n            }\r\n            IncomingWsMessage::Ping =\u003e {\r\n                send_pong(tx).await;\r\n            }\r\n            IncomingWsMessage::Typing {\r\n                user_id: uid,\r\n                username: uname,\r\n                channel_id: cid,\r\n            } =\u003e {\r\n                broadcast_typing(tx, uid, uname, cid).await;\r\n            }\r\n            _ =\u003e {\r\n                // Ignorer les autres types de messages (ex: Identify utilisé pour les WebSockets serveur)\r\n            }\r\n        },\r\n        Err(e) =\u003e {\r\n            eprintln!(\"❌ Erreur parsing message WebSocket: {} - Message: {}\", e, text);\r\n        }\r\n    }\r\n}\r\n\r\n/// Gérer un nouveau message\r\nasync fn handle_new_message(\r\n    tx: \u0026tokio::sync::broadcast::Sender\u003cString\u003e,\r\n    channel_id: \u0026str,\r\n    user_id_arc: \u0026Arc\u003cRwLock\u003cOption\u003cString\u003e\u003e\u003e,\r\n    username_arc: \u0026Arc\u003cRwLock\u003cOption\u003cString\u003e\u003e\u003e,\r\n    content: String,\r\n    user_id: String,\r\n    username: String,\r\n    server_id: Option\u003cString\u003e,\r\n) {\r\n    // Capturer l'identité de l'utilisateur au premier message\r\n    let is_first_message = {\r\n        let uid = user_id_arc.read().await;\r\n        uid.is_none()\r\n    };\r\n\r\n    if is_first_message {\r\n        *user_id_arc.write().await = Some(user_id.clone());\r\n        *username_arc.write().await = Some(username.clone());\r\n\r\n        // Broadcaster user_joined\r\n        if let Some(ref srv_id) = server_id {\r\n            let joined_msg = WsMessage::UserJoined {\r\n                user_id: user_id.clone(),\r\n                username: username.clone(),\r\n                server_id: srv_id.clone(),\r\n            };\r\n            if let Ok(json) = serde_json::to_string(\u0026joined_msg) {\r\n                let _ = tx.send(json);\r\n                println!(\"👤 User joined: {} ({})\", username, user_id);\r\n            }\r\n        }\r\n    }\r\n\r\n    // Ignorer les messages vides (messages de présence uniquement)\r\n    if content.trim().is_empty() {\r\n        println!(\"📡 Message de présence reçu (ignoré): {}\", username);\r\n        return;\r\n    }\r\n\r\n    // Sauvegarder le message en base de données\r\n    let message_result = tokio::task::spawn_blocking({\r\n        let channel_id = channel_id.to_string();\r\n        let content = content.clone();\r\n        let user_id = user_id.clone();\r\n        move || {\r\n            use crate::adapters::db::postgres_message_repository::PostgresMessageRepo;\r\n            use crate::adapters::db::postgres_user_repository::PostgresUserRepo;\r\n            use crate::domain::usecases::message::send_message::SendMessage;\r\n\r\n            let repo = PostgresMessageRepo;\r\n            let repo_user = PostgresUserRepo;\r\n            let use_case = SendMessage { repo_message: \u0026repo, repo_user: \u0026repo_user };\r\n            use_case.execute(channel_id, user_id, content)\r\n        }\r\n    })\r\n    .await;\r\n\r\n    match message_result {\r\n        Ok(Ok(saved_message)) =\u003e {\r\n            // Créer le message WS SORTANT avec les vraies données de la DB\r\n            let broadcast_msg = WsMessage::NewMessage {\r\n                message_id: saved_message.message_id,\r\n                content: saved_message.content,\r\n                user_id: saved_message.user.user_id,\r\n                username: saved_message.user.username,\r\n                channel_id: saved_message.channel_id,\r\n                create_at: saved_message.create_at,\r\n            };\r\n\r\n            // Broadcaster le message à tous les clients\r\n            if let Ok(json) = serde_json::to_string(\u0026broadcast_msg) {\r\n                let _ = tx.send(json);\r\n            }\r\n        }\r\n        Ok(Err(e)) =\u003e {\r\n            eprintln!(\"❌ Erreur sauvegarde message: {}\", e);\r\n        }\r\n        Err(e) =\u003e {\r\n            eprintln!(\"❌ Erreur task: {}\", e);\r\n        }\r\n    }\r\n}\r\n\r\n/// Envoyer un pong en réponse à un ping\r\nasync fn send_pong(tx: \u0026tokio::sync::broadcast::Sender\u003cString\u003e) {\r\n    let pong = WsMessage::Pong;\r\n    if let Ok(json) = serde_json::to_string(\u00 \n            \"\".to_string(),\r\n            \"\".to_string(),\r\n        );\r\n\r\n        assert!(result.is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn test_join_server_none() {\r\n        let server_repo = MockServerRepository::new();\r\n        let member_repo = MockMemberRepository::new();\r\n        let role_repo = MockRoleRepository::new();\r\n\r\n        let use_case = JoinServer {\r\n            repo: \u0026server_repo,\r\n            repo2: \u0026member_repo,\r\n            repo3: \u0026role_repo,\r\n        };\r\n\r\n        let result = use_case.execute(\r\n            \"user-1\".to_string(),\r\n            \"non-existent\".to_string(),\r\n            \"pass\".to_string(),\r\n            \"role-default\".to_string(),\r\n        );\r\n\r\n        assert!(result.is_err());\r\n        assert_eq!(result.unwrap_err(), \"Serveur introuvable\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_join_by_invite() {\r\n        let server_repo = MockServerRepository::new();\r\n        let member_repo = MockMemberRepository::new();\r\n        let role_repo = MockRoleRepository::new();\r\n\r\n        let server = server_repo.create_test_server(\"srv-1\", \"MyServer\", \"password123\");\r\n        server_repo.add_server(server);\r\n        let use_case = JoinServerByInvite {\r\n            repo: \u0026server_repo,\r\n            repo2: \u0026member_repo,\r\n            repo3: \u0026role_repo,\r\n        };\r\n\r\n        let result = use_case.execute(\r\n            \"user-1\".to_string(),\r\n            \"invite-srv-1\".to_string(),  \r\n            \"role02\".to_string(),\r\n        );\r\n\r\n        assert!(result.is_ok());\r\n        let member = result.unwrap();\r\n        assert_eq!(member.user.user_id, \"user-1\");\r\n        assert_eq!(member.role.role_name, \"Membre\");\r\n        assert_eq!(member.server.server_id, \"srv-1\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_join_by_invite_invalid_code() {\r\n        let server_repo = MockServerRepository::new();\r\n n    #[test]\r\n    fn test_get_user_by_id_not_found() {\r\n        let repo = MockUserRepository::new();\r\n        let use_case = GetUserById { repo: \u0026repo };\r\n\r\n        let result = use_case.execute(\"user-inexistant\".to_string());\r\n\r\n        assert!(result.is_err());\r\n        assert_eq!(result.unwrap_err(), \"id introuvable\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_get_user_by_username_success() {\r\n        let repo = MockUserRepository::new();\r\n        let use_case = GetUserByUsername { repo: \u0026repo };\r\n\r\n        let result = use_case.execute(\"user-test\".to_string());\r\n\r\n        assert!(result.is_ok());\r\n        let user = result.unwrap();\r\n        assert_eq!(user.username, \"user-test\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_get_user_by_username_empty() {\r\n        let repo = MockUserRepository::new();\r\n        let use_case = GetUserByUsername { repo: \u0026repo };\r\n\r\n        let result = use_case.execute(\"\".to_string());\r\n\r\n        assert!(result.is_err());\r\n        assert_eq!(result.unwrap_err(), \"Mettre un username valide\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_login_user_success() {\r\n        let repo = MockUserRepository::new();\r\n        // \"user-test\" / \"password\" pré-chargé dans MockUserRepository::new()\r\n        let use_case = LoginUser { repo: \u0026repo };\r\n\r\n        let result = use_case.execute(\"user-test\".to_string(), \"password\".to_string());\r\n\r\n        assert!(result.is_ok());\r\n        let user = result.unwrap();\r\n        assert_eq!(user.username, \"user-test\");\r\n        assert!(user.token.is_some());\r\n    }\r\n\r\n    #[test]\r\n    fn test_login_user_empty() {\r\n        let repo = MockUserRepository::new();\r\n        let use_case = LoginUser { repo: \u0026repo };\r\n\r\n        let result = use_case.execute(\"\".to_string(), \"\".to_string());\r\n\r\n        assert!(result.is_err());\r\n        assert_eq!(result.unwrap_err(), \"Entrer un Utili ::entities::member::Member;\n    use backend::domain::entities::role::Role;\n\n    // ═══════════════════════════════════════════════════════════════\n    // TESTS USER\n    // ═══════════════════════════════════════════════════════════════\n\n    #[test]\n    fn test_user_creation() {\n        let user = User {\n            user_id: \"u123\".to_string(),\n            username: \"testuser\".to_string(),\n            email: \"test@example.com\".to_string(),\n            password: \"hashed\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n        assert_eq!(user.username, \"testuser\");\n        assert!(user.token.is_none());\n    }\n\n    #[test]\n    fn test_user_with_token() {\n        let user = User {\n            user_id: \"u456\".to_string(),\n            username: \"user2\".to_string(),\n            email: \"user2@test.com\".to_string(),\n            password: \"hash\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: Some(\"token123\".to_string()),\n        };\n        assert!(user.token.is_some());\n    }\n\n    #[test]\n    fn test_user_email_format() {\n        let user = User {\n            user_id: \"u789\".to_string(),\n            username: \"user3\".to_string(),\n            email: \"valid@email.com\".to_string(),\n            password: \"hash\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n        assert!(user.email.contains('@'));\n    }\n\n    // ═══════════════════════════════════════════════════════════════\n    // TESTS SERVER\n    // ═══════════════════════════════════════════════════════════════\n\n    #[test]\n    fn test_server_creation() {\n        let server = Server {\n            name: \"Test Server\".to_string(),\n            server_id: \"srv123\".to_string(),\n            password: \"pass\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            invite_code: \"INVITE\".to_string(),\n            all_channels: vec![],\n        };\n        assert_eq!(server.name, \"Test Server\");\n        assert_eq!(server.all_channels.len(), 0);\n    }\n\n    #[test]\n    fn test_server_with_channels() {\n        let channel = Channel {\n            channel_id: \"ch1\".to_string(),\n            server_id: \"srv1\".to_string(),\n            name: \"general\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n        };\n\n        let server = Server {\n            name: \"Server With Channels\".to_string(),\n            server_id: \"srv1\".to_string(),\n            password: \"pass\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            invite_code: \"CODE\".to_string(),\n            all_channels: vec![channel],\n        };\n        assert_eq!(server.all_channels.len(), 1);\n    }\n\n    #[test]\n    fn test_server_invite_code() {\n        let server = Server {\n            name: \"Invite Server\".to_string(),\n            server_id: \"srv2\".to_string(),\n            password: \"pass\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            invite_code: \"ABC123\".to_string(),\n            all_channels: vec![],\n        };\n        assert_eq!(server.invite_code, \"ABC123\");\n    }\n\n    // ═══════════════════════════════════════════════════════════════\n    // TESTS CHANNEL\n    // ═══════════════════════════════════════════════════════════════\n\n    #[test]\n    fn test_channel_creation() {\n        let channel = Channel {\n            channel_id: \"ch123\".to_string(),\n            server_id: \"srv123\".to_string(),\n            name: \"general\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n        };\n        assert_eq!(channel.name, \"general\");\n    }\n\n    #[test]\n    fn test_channel_name_validation() {\n        let channel = Channel {\n            channel_id: \"ch456\".to_string(),\n            server_id: \"srv123\".to_string(),\n            name: \"announcements\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n        };\n        assert!(!channel.name.is_empty());\n    }\n\n    #[test]\n    fn test_channel_belongs_to_server() {\n        let channel = Channel {\n            channel_id: \"ch789\".to_string(),\n            server_id: \"srv999\".to_string(),\n            name: \"random\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n        };\n        assert_eq!(channel.server_id, \"srv999\");\n    }\n\n    // ═══════════════════════════════════════════════════════════════\n    // TESTS MESSAGE\n    // ═══════════════════════════════════════════════════════════════\n\n    #[test]\n    fn test_message_creation() {\n        let user = User {\n            user_id: \"u1\".to_string(),\n            username: \"sender\".to_string(),\n            email: \"sender@test.com\".to_string(),\n            password: \"hash\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n\n        let message = Message {\n            message_id: \"msg1\".to_string(),\n            channel_id: \"ch1\".to_string(),\n            content: \"Hello!\".to_string(),\n            user: user.clone(),\n            create_at: \"2024-01-01\".to_string(),\n        };\n        assert_eq!(message.content, \"Hello!\");\n    }\n\n    #[test]\n    fn test_message_with_user() {\n        let user = User {\n            user_id: \"u2\".to_string(),\n            username: \"author\".to_string(),\n            email: \"author@test.com\".to_string(),\n            password: \"hash\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n\n        let message = Message {\n            message_id: \"msg2\".to_string(),\n            channel_id: \"ch2\".to_string(),\n            content: \"Test message\".to_string(),\n            user: user.clone(),\n            create_at: \"2024-01-01\".to_string(),\n        };\n        assert_eq!(message.user.username, \"author\");\n    }\n\n    #[test]\n    fn test_message_empty_content() {\n        let user = User {\n            user_id: \"u3\".to_string(),\n            username: \"user3\".to_string(),\n            email: \"user3@test.com\".to_string(),\n            password: \"hash\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n\n        let message = Message {\n            message_id: \"msg3\".to_string(),\n            channel_id: \"ch3\".to_string(),\n            content: \"\".to_string(),\n            user: user,\n            create_at: \"2024-01-01\".to_string(),\n        };\n        assert_eq!(message.content.len(), 0);\n    }\n\n    // ═══════════════════════════════════════════════════════════════\n    // TESTS MEMBER\n    // ═══════════════════════════════════════════════════════════════\n\n    #[test]\n    fn test_member_creation() {\n        let user = User {\n            user_id: \"u1\".to_string(),\n            username: \"member1\".to_string(),\n            email: \"member1@test.com\".to_string(),\n            password: \"hash\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n\n        let server = Server {\n            name: \"Server\".to_string(),\n            server_id: \"srv1\".to_string(),\n            password: \"pass\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            invite_code: \"CODE\".to_string(),\n            all_channels: vec![],\n        };\n\n        let role = Role {\n            role_id: \"r1\".to_string(),\n            role_name: \"Member\".to_string(),\n        };\n\n        let member = Member {\n            user: user.clone(),\n            server: server,\n            role: role,\n            join_at: \"2024-01-01\".to_string(),\n        };\n\n        assert_eq!(member.user.username, \"member1\");\n    }\n\n    #[test]\n    fn test_member_role() {\n        let user = User {\n            user_id: \"u2\".to_string(),\n            username: \"admin_user\".to_string(),\n            email: \"admin@test.com\".to_string(),\n            password: \"hash\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n\n        let server = Server {\n            name: \"Server\".to_string(),\n            server_id: \"srv2\".to_string(),\n            password: \"pass\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            invite_code: \"CODE\".to_string(),\n            all_channels: vec![],\n        };\n\n        let role = Role {\n            role_id: \"admin\".to_string(),\n            role_name: \"Admin\".to_string(),\n        };\n\n        let member = Member {\n            user: user,\n            server: server,\n            role: role,\n            join_at: \"2024-01-01\".to_string(),\n        };\n\n        assert_eq!(member.role.role_name, \"Admin\");\n    }\n\n    #[test]\n    fn test_member_belongs_to_server() {\n        let user = User {\n            user_id: \"u3\".to_string(),\n            username: \"user3\".to_string(),\n            email: \"user3@test.com\".to_string(),\n            password: \"hash\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n\n        let server = Server {\n            name: \"Test Server\".to_string(),\n            server_id: \"srv_test\".to_string(),\n            password: \"pass\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            invite_code: \"CODE\".to_string(),\n            all_channels: vec![],\n        };\n\n        let role = Role {\n            role_id: \"member\".to_string(),\n            role_name: \"Member\".to_string(),\n        };\n\n        let member = Member {\n            user: user,\n            server: server,\n            role: role,\n            join_at: \"2024-01-01\".to_string(),\n        };\n\n        assert_eq!(member.server.server_id, \"srv_test\");\n    }\n\n    // ═══════════════════════════════════════════════════════════════\n    // TESTS ROLE\n    // ═══════════════════════════════════════════════════════════════\n\n    #[test]\n    fn test_role_creation() {\n        let role = Role {\n            role_id: \"r1\".to_string(),\n            role_name: \"Admin\".to_string(),\n        };\n        assert_eq!(role.role_name, \"Admin\");\n    }\n\n    #[test]\n    fn test_role_name() {\n        let role = Role {\n            role_id: \"r2\".to_string(),\n            role_name: \"Moderator\".to_string(),\n        };\n        assert!(!role.role_name.is_empty());\n    }\n\n    #[test]\n    fn test_multiple_roles() {\n        let admin = Role {\n            role_id: \"r_admin\".to_string(),\n            role_name: \"Admin\".to_string(),\n        };\n        let member = Role {\n            role_id: \"r_member\".to_string(),\n            role_name: \"Member\".to_string(),\n        };\n        assert_ne!(admin.role_id, member.role_id);\n    }\n\n    // ═══════════════════════════════════════════════════════════════\n    // TESTS DE LOGIQUE MÉTIER\n    // ═══════════════════════════════════════════════════════════════\n\n    #[test]\n    fn test_user_registration_flow() {\n        let username = \"newuser\";\n        let email = \"new@test.com\";\n\n        assert!(!username.is_empty());\n        assert!(email.contains('@'));\n    }\n\n    #[test]\n    fn test_server_creation_flow() {\n        let server_name = \"My Server\";\n        let invite_code = \"ABC123\";\n\n        assert!(server_name.len() \u003e 0);\n        assert!(invite_code.len() \u003e= 6);\n    }\n\n    #[test]\n    fn test_channel_in_server_flow() {\n        let server_id = \"srv123\";\n        let channel_name = \"general\";\n\n        assert!(!server_id.is_empty());\n        assert!(!channel_name.is_empty());\n    }\n\n    #[test]\n    fn test_message_sending_flow() {\n        let content = \"Hello World\";\n        let channel_id = \"ch1\";\n = \"securepass123\";\n\n        assert!(!username.is_empty());\n        assert!(email.contains('@'));\n        assert!(password.len() \u003e= 8);\n    }\n\n    #[test]\n    fn test_server_creation_flow() {\n        let server_name = \"My Server\";\n        let invite_code = \"ABCD12\";\n\n        assert!(!server_name.is_empty());\n        assert_eq!(invite_code.len(), 6);\n    }\n\n    #[test]\n    fn test_message_sending_flow() {\n        let content = \"Hello!\";\n        let user_id = \"user123\";\n        let channel_id = \"ch456\";\n\n        assert!(!content.trim().is_empty());\n        assert!(!user_id.is_empty());\n        assert!(!channel_id.is_empty());\n    }\n}\n\n// Tests WebSocket\n#[cfg(test)]\nmod websocket_tests {\n    use serde_json::json;\n\n    #[test]\n    fn test_ws_message_serialization() {\n        let msg = json!({\n            \"type\": \"new_message\",\n            \"content\": \"test\",\n            \"user_id\": \"user1\",\n            \"username\": \"alice\",\n            \"channel_id\": \"ch1\"\n        });\n\n        assert_eq!(msg[\"type\"], \"new_message\");\n        assert_eq!(msg[\"content\"], \"test\");\n    }\n\n    #[test]\n    fn test_user_joined_event() {\n        let event = json!({\n            \"type\": \"user_joined\",\n            \"user_id\": \"user1\",\n            \"username\": \"alice\",\n            \"server_id\": \"srv1\"\n        });\n\n        assert_eq!(event[\"type\"], \"user_joined\");\n        assert_eq!(event[\"username\"], \"alice\");\n    }\n\n    #[test]\n    fn test_user_left_event() {\n        let event = json!({\n            \"type\": \"user_left\",\n            \"user_id\": \"user1\",\n            \"username\": \"alice\",\n            \"server_id\": \"srv1\"\n        });\n\n        assert_eq!(event[\"type\"], \"user_left\");\n        assert_eq!(event[\"user_id\"], \"user1\");\n    }\n}\n\n// Tests validation\n#[cfg(test)]\nmod validation_tests {\n    #[test]\n    fn test_email_format() {\n        let valid_email = \"user@example.com\";\n        let invalid_email = \"notanemail\";\n\n        assert!(valid_email.contains('@'));\n        assert!(!invalid_email.contains('@'));\n    }\n\n    #[test]\n    fn test_password_length() {\n        let strong_password = \"SecurePass123!\";\n        let weak_password = \"123\";\n\n        assert!(strong_password.len() \u003e= 8);\n        assert!(weak_password.len() \u003c 8);\n    }\n\n    #[test]\n    fn test_username_valid() {\n        let valid_username = \"alice\";\n        let invalid_username = \"\";\n\n        assert!(!valid_username.is_empty());\n        assert!(invalid_username.is_empty());\n    }\n\n    #[test]\n    fn test_email_lowercase() {\n        let email = \"User@Example.COM\";\n        let normalized = email.to_lowercase();\n        assert_eq!(normalized, \"user@example.com\");\n    }\n\n    #[test]\n    fn test_password_min_requirements() {\n        let password = \"Pass123!\";\n        assert!(password.len() \u003e= 8);\n        assert!(password.chars().any(|c| c.is_numeric()));\n        assert!(password.chars().any(|c| c.is_uppercase()));\n    }\n}\n\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","dimitri","vicualGitEpitech","T-DEV-600-NAN_6","backend","tests","unit_tests.rs"],"content":"// Tests unitaires pour les entités et la logique métier\n// backend/tests/unit_tests.rs\n\n#[cfg(test)]\nmod entity_validation {\n    #[test]\n    fn test_user_has_required_fields() {\n        let user_id = \"test_id\".to_string();\n        let username = \"testuser\".to_string();\n        let email = \"test@example.com\".to_string();\n        let password = \"hashed\".to_string();\n\n        assert!(!user_id.is_empty());\n        assert!(!username.is_empty());\n        assert!(!email.is_empty());\n        assert!(!password.is_empty());\n    }\n\n    #[test]\n    fn test_message_content_can_be_empty() {\n        // Pour les messages de présence\n        let content = \"\".to_string();\n        assert_eq!(content, \"\");\n    }\n\n    #[test]\n    fn test_message_with_content() {\n        let content = \"Hello!\".to_string();\n        assert!(!content.is_empty());\n        assert_eq!(content, \"Hello!\");\n    }\n}\n\n#[cfg(test)]\nmod string_tests {\n    #[test]\n    fn test_trim_whitespace() {\n        let text = \"  hello  \".to_string();\n        let trimmed = text.trim();\n        assert_eq!(trimmed, \"hello\");\n    }\n\n    #[test]\n    fn test_lowercase_conversion() {\n        let text = \"HeLLo\".to_string();\n        let lower = text.to_lowercase();\n        assert_eq!(lower, \"hello\");\n    }\n\n    #[test]\n    fn test_string_contains() {\n        let email = \"user@example.com\";\n        assert!(email.contains('@'));\n        assert!(email.contains('.'));\n    }\n}\n\n#[cfg(test)]\nmod jwt_tests {\n    #[test]\n    fn test_jwt_secret_exists() {\n        std::env::set_var(\"JWT_SECRET\", \"test_secret_key\");\n        let secret = std::env::var(\"JWT_SECRET\");\n        assert!(secret.is_ok());\n        assert!(!secret.unwrap().is_empty());\n    }\n\n    #[test]\n    fn test_jwt_secret_length() {\n        let secret = \"my_super_secret_key_123\";\n        assert!(secret.len() \u003e= 16);\n    }\n}\n\n#[cfg(test)]\nmod database_tests {\n    #[test]\n    fn test_database_url_format() {\n        std::env::set_var(\"DATABASE_URL\", \"postgresql://user:pass@localhost:5432/db\");\n        let url = std::env::var(\"DATABASE_URL\");\n        assert!(url.is_ok());\n        assert!(url.unwrap().starts_with(\"postgresql://\"));\n    }\n\n    #[test]\n    fn test_database_connection_string() {\n        let conn_str = \"postgresql://postgres:password@localhost:5432/mydb\";\n        assert!(conn_str.contains(\"postgresql://\"));\n        assert!(conn_str.contains(\"localhost\"));\n        assert!(conn_str.contains(\"5432\"));\n    }\n}\n\n#[cfg(test)]\nmod uuid_tests {\n    use uuid::Uuid;\n\n    #[test]\n    fn test_uuid_generation() {\n        let id1 = Uuid::new_v4().to_string();\n        let id2 = Uuid::new_v4().to_string();\n\n        assert_ne!(id1, id2);\n        assert!(!id1.is_empty());\n        assert!(!id2.is_empty());\n    }\n\n    #[test]\n    fn test_uuid_format() {\n        let id = Uuid::new_v4().to_string();\n        // UUID format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx\n        assert_eq!(id.len(), 36);\n        assert_eq!(id.chars().filter(|c| *c == '-').count(), 4);\n    }\n}\n\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","dimitri","vicualGitEpitech","T-DEV-600-NAN_6","backend","tests","usecase_coverage_tests.rs"],"content":"// Tests pour augmenter la couverture des use cases\n// Objectif : atteindre 70%+ de couverture\n\nuse backend::domain::entities::user::User;\nuse backend::domain::entities::server::Server;\nuse backend::domain::entities::channel::Channel;\nuse backend::domain::entities::message::Message;\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: USER CREATE\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod user_create_tests {\n    use super::*;\n\n    #[test]\n    fn test_user_create_with_valid_data() {\n        let username = \"newuser\";\n        let email = \"new@test.com\";\n        let password = \"Pass123!\";\n\n        // Simulate validation\n        assert!(!username.is_empty());\n        assert!(email.contains('@'));\n        assert!(password.len() \u003e= 6);\n\n        // Simulate user creation\n        let user = User {\n            user_id: uuid::Uuid::new_v4().to_string(),\n            username: username.to_string(),\n            email: email.to_lowercase(),\n            password: format!(\"hashed_{}\", password),\n            create_at: chrono::Utc::now().to_rfc3339(),\n            token: None,\n        };\n\n        assert_eq!(user.username, \"newuser\");\n        assert_eq!(user.email, \"new@test.com\");\n        assert!(user.password.starts_with(\"hashed_\"));\n    }\n\n    #[test]\n    fn test_user_create_email_lowercase() {\n        let email = \"Test@EXAMPLE.COM\";\n        let normalized = email.to_lowercase();\n        assert_eq!(normalized, \"test@example.com\");\n    }\n\n    #[test]\n    fn test_user_create_generates_id() {\n        let id1 = uuid::Uuid::new_v4().to_string();\n        let id2 = uuid::Uuid::new_v4().to_string();\n        assert_ne!(id1, id2);\n    }\n\n    #[test]\n    fn test_user_create_no_token() {\n        let user = User {\n            user_id: \"u1\".to_string(),\n            username: \"test\".to_string(),\n            email: \"test@test.com\".to_string(),\n            password: \"hashed\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n        assert!(user.token.is_none());\n    }\n}\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: USER LOGIN\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod user_login_tests {\n    use super::*;\n\n    #[test]\n    fn test_user_login_success() {\n        let email = \"test@test.com\";\n        let password = \"Pass123!\";\n\n        // Simulate password verification\n        let stored_hash = format!(\"hashed_{}\", password);\n        let input_hash = format!(\"hashed_{}\", password);\n        assert_eq!(stored_hash, input_hash);\n\n        // Simulate token generation\n        let token = format!(\"jwt_token_{}\", uuid::Uuid::new_v4());\n        assert!(token.starts_with(\"jwt_token_\"));\n    }\n\n    #[test]\n    fn test_user_login_generates_token() {\n        let user_id = \"user123\";\n        let username = \"testuser\";\n\n        // Simulate JWT token payload\n        let payload = format!(\"{{\\\"user_id\\\":\\\"{}\\\",\\\"username\\\":\\\"{}\\\"}}\", user_id, username);\n        assert!(payload.contains(user_id));\n        assert!(payload.contains(username));\n    }\n\n    #[test]\n    fn test_user_login_token_stored() {\n        let mut user = User {\n            user_id: \"u1\".to_string(),\n            username: \"user\".to_string(),\n            email: \"user@test.com\".to_string(),\n            password: \"hashed\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n\n        // Simulate login\n        user.token = Some(\"new_jwt_token\".to_string());\n        assert!(user.token.is_some());\n        assert_eq!(user.token.unwrap(), \"new_jwt_token\");\n    }\n\n    #[test]\n    fn test_login_email_case_insensitive() {\n        let input_email = \"Test@Example.COM\";\n        let stored_email = \"test@example.com\";\n        assert_eq!(input_email.to_lowercase(), stored_email);\n    }\n}\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: USER LOGOUT\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod user_logout_tests {\n    use super::*;\n\n    #[test]\n    fn test_user_logout_removes_token() {\n        let mut user = User {\n            user_id: \"u1\".to_string(),\n            username: \"user\".to_string(),\n            email: \"user@test.com\".to_string(),\n            password: \"hashed\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: Some(\"jwt_token\".to_string()),\n        };\n\n        // Simulate logout\n        user.token = None;\n        assert!(user.token.is_none());\n    }\n\n    #[test]\n    fn test_logout_user_id_validation() {\n        let user_id = \"user123\";\n        assert!(!user_id.is_empty());\n        assert!(user_id.len() \u003e 0);\n    }\n}\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: USER FIND BY ID\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod user_find_by_id_tests {\n    use super::*;\n\n    #[test]\n    fn test_find_user_by_id() {\n        let users = vec![\n            User {\n                user_id: \"u1\".to_string(),\n                username: \"user1\".to_string(),\n                email: \"user1@test.com\".to_string(),\n                password: \"hash1\".to_string(),\n                create_at: \"2024-01-01\".to_string(),\n                token: None,\n            },\n            User {\n                user_id: \"u2\".to_string(),\n                username: \"user2\".to_string(),\n                email: \"user2@test.com\".to_string(),\n                password: \"hash2\".to_string(),\n                create_at: \"2024-01-01\".to_string(),\n                token: None,\n            },\n        ];\n\n        let search_id = \"u1\";\n        let found = users.iter().find(|u| u.user_id == search_id);\n        assert!(found.is_some());\n        assert_eq!(found.unwrap().username, \"user1\");\n    }\n\n    #[test]\n    fn test_find_user_not_found() {\n        let users = vec![\n            User {\n                user_id: \"u1\".to_string(),\n                username: \"user1\".to_string(),\n                email: \"user1@test.com\".to_string(),\n                password: \"hash1\".to_string(),\n                create_at: \"2024-01-01\".to_string(),\n                token: None,\n            },\n        ];\n\n        let search_id = \"u999\";\n        let found = users.iter().find(|u| u.user_id == search_id);\n        assert!(found.is_none());\n    }\n}\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: SERVER CREATE\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod server_create_tests {\n    use super::*;\n\n    #[test]\n    fn test_server_create_with_invite_code() {\n        let server_name = \"My Server\";\n        let _owner_id = \"user123\";\n\n        // Generate invite code using UUID\n        let invite_code = uuid::Uuid::new_v4()\n            .to_string()\n            .replace(\"-\", \"\")\n            .chars()\n            .take(6)\n            .collect::\u003cString\u003e()\n            .to_uppercase();\n\n        let server = Server {\n            name: server_name.to_string(),\n            server_id: uuid::Uuid::new_v4().to_string(),\n            password: \"\".to_string(),\n            create_at: chrono::Utc::now().to_rfc3339(),\n            invite_code: invite_code.clone(),\n            all_channels: vec![],\n        };\n\n        assert_eq!(server.name, \"My Server\");\n        assert_eq!(invite_code.len(), 6);\n        assert!(invite_code.chars().all(|c| c.is_alphanumeric()));\n    }\n\n    #[test]\n    fn test_server_create_with_default_channel() {\n        let server_id = uuid::Uuid::new_v4().to_string();\n\n        let default_channel = Channel {\n            channel_id: uuid::Uuid::new_v4().to_string(),\n            server_id: server_id.clone(),\n            name: \"general\".to_string(),\n            create_at: chrono::Utc::now().to_rfc3339(),\n        };\n\n        let server = Server {\n            name: \"Server\".to_string(),\n            server_id: server_id.clone(),\n            password: \"\".to_string(),\n            create_at: chrono::Utc::now().to_rfc3339(),\n            invite_code: \"ABC123\".to_string(),\n            all_channels: vec![default_channel.clone()],\n        };\n\n        assert_eq!(server.all_channels.len(), 1);\n        assert_eq!(server.all_channels[0].name, \"general\");\n    }\n\n    #[test]\n    fn test_server_name_validation() {\n        let valid_names = vec![\"Server\", \"My Server\", \"Gaming\", \"Test 123\"];\n        for name in valid_names {\n            assert!(!name.is_empty());\n            assert!(name.len() \u003e= 1);\n            assert!(name.len() \u003c= 100);\n        }\n    }\n}\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: SERVER DELETE\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod server_delete_tests {\n    use super::*;\n\n    #[test]\n    fn test_server_delete_by_owner() {\n        let owner_id = \"user123\";\n        let server = Server {\n            name: \"Delete Me\".to_string(),\n            server_id: \"srv1\".to_string(),\n            password: \"\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            invite_code: \"CODE\".to_string(),\n            all_channels: vec![],\n        };\n\n        // Simulate ownership check\n        let requesting_user = \"user123\";\n        // In real code: assert_eq!(server.owner_id, requesting_user);\n        assert_eq!(owner_id, requesting_user);\n    }\n\n    #[test]\n    fn test_server_delete_cascades_channels() {\n        let server_id = \"srv1\";\n        let channels = vec![\n            Channel {\n                channel_id: \"ch1\".to_string(),\n                server_id: server_id.to_string(),\n                name: \"general\".to_string(),\n                create_at: \"2024-01-01\".to_string(),\n            },\n        ];\n\n        // Simulate cascade delete\n        let remaining: Vec\u003c_\u003e = channels.iter()\n            .filter(|c| c.server_id != server_id)\n            .collect();\n        assert_eq!(remaining.len(), 0);\n    }\n}\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: SERVER JOIN\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod server_join_tests {\n    use super::*;\n\n    #[test]\n    fn test_server_join_with_invite() {\n        let server = Server {\n            name: \"Public Server\".to_string(),\n            server_id: \"srv1\".to_string(),\n            password: \"\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            invite_code: \"ABC123\".to_string(),\n            all_channels: vec![],\n        };\n\n        let user_invite = \"ABC123\";\n        assert_eq!(server.invite_code, user_invite);\n    }\n\n    #[test]\n    fn test_server_join_assigns_default_role() {\n        let user_id = \"user123\";\n        let server_id = \"srv1\";\n        let default_role = \"member\";\n\n        // Simulate member creation\n        assert!(!user_id.is_empty());\n        assert!(!server_id.is_empty());\n        assert_eq!(default_role, \"member\");\n    }\n\n    #[test]\n    fn test_server_join_prevents_duplicate() {\n        let existing_members = vec![\"user1\", \"user2\", \"user3\"];\n        let new_user = \"user2\";\n\n        let already_member = existing_members.contains(\u0026new_user);\n        assert!(already_member);\n    }\n}\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: SERVER GET\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod server_get_tests {\n    use super::*;\n\n    #[test]\n    fn test_get_server_by_id() {\n        let servers = vec![\n            Server {\n                name: \"Server 1\".to_string(),\n                server_id: \"srv1\".to_string(),\n                password: \"\".to_string(),\n                create_at: \"2024-01-01\".to_string(),\n                invite_code: \"CODE1\".to_string(),\n                all_channels: vec![],\n            },\n        ];\n\n        let search_id = \"srv1\";\n        let found = servers.iter().find(|s| s.server_id == search_id);\n        assert!(found.is_some());\n    }\n\n    #[test]\n    fn test_get_server_with_channels() {\n        let channel = Channel {\n            channel_id: \"ch1\".to_string(),\n            server_id: \"srv1\".to_string(),\n            name: \"general\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n        };\n\n        let server = Server {\n            name: \"Server\".to_string(),\n            server_id: \"srv1\".to_string(),\n            password: \"\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            invite_code: \"CODE\".to_string(),\n            all_channels: vec![channel],\n        };\n\n        assert_eq!(server.all_channels.len(), 1);\n    }\n}\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: SERVER UPDATE\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod server_update_tests {\n    use super::*;\n\n    #[test]\n    fn test_server_update_name() {\n        let mut server = Server {\n            name: \"Old Name\".to_string(),\n            server_id: \"srv1\".to_string(),\n            password: \"\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            invite_code: \"CODE\".to_string(),\n            all_channels: vec![],\n        };\n\n        server.name = \"New Name\".to_string();\n        assert_eq!(server.name, \"New Name\");\n    }\n\n    #[test]\n    fn test_server_update_requires_owner() {\n        let owner_id = \"user123\";\n        let requesting_user = \"user123\";\n        assert_eq!(owner_id, requesting_user);\n    }\n}\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: CHANNEL CREATE\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod channel_create_tests {\n    use super::*;\n\n    #[test]\n    fn test_channel_create_in_server() {\n        let server_id = \"srv1\";\n        let channel_name = \"new-channel\";\n\n        let channel = Channel {\n            channel_id: uuid::Uuid::new_v4().to_string(),\n            server_id: server_id.to_string(),\n            name: channel_name.to_string(),\n            create_at: chrono::Utc::now().to_rfc3339(),\n        };\n\n        assert_eq!(channel.name, \"new-channel\");\n        assert_eq!(channel.server_id, server_id);\n    }\n\n    #[test]\n    fn test_channel_name_lowercase() {\n        let input_name = \"My Channel\";\n        let normalized = input_name.to_lowercase().replace(\" \", \"-\");\n        assert_eq!(normalized, \"my-channel\");\n    }\n\n    #[test]\n    fn test_channel_unique_per_server() {\n        let existing_channels = vec![\"general\", \"random\", \"help\"];\n        let new_channel = \"general\";\n\n        let exists = existing_channels.contains(\u0026new_channel);\n        assert!(exists);\n    }\n}\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: CHANNEL DELETE\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod channel_delete_tests {\n    use super::*;\n\n    #[test]\n    fn test_channel_delete_by_id() {\n        let channel_id = \"ch1\";\n        let channels = vec![\n            Channel {\n                channel_id: \"ch1\".to_string(),\n                server_id: \"srv1\".to_string(),\n                name: \"general\".to_string(),\n                create_at: \"2024-01-01\".to_string(),\n            },\n        ];\n\n        let remaining: Vec\u003c_\u003e = channels.iter()\n            .filter(|c| c.channel_id != channel_id)\n            .collect();\n        assert_eq!(remaining.len(), 0);\n    }\n\n    #[test]\n    fn test_channel_delete_cascades_messages() {\n        let channel_id = \"ch1\";\n        let user = User {\n            user_id: \"u1\".to_string(),\n            username: \"user\".to_string(),\n            email: \"user@test.com\".to_string(),\n            password: \"hash\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n\n        let messages = vec![\n            Message {\n                message_id: \"m1\".to_string(),\n                channel_id: channel_id.to_string(),\n                content: \"Message\".to_string(),\n                user: user,\n                create_at: \"2024-01-01\".to_string(),\n            },\n        ];\n\n        let remaining: Vec\u003c_\u003e = messages.iter()\n            .filter(|m| m.channel_id != channel_id)\n            .collect();\n        assert_eq!(remaining.len(), 0);\n    }\n}\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: MESSAGE SEND\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod message_send_tests {\n    use super::*;\n\n    #[test]\n    fn test_message_send_success() {\n        let user = User {\n            user_id: \"u1\".to_string(),\n            username: \"sender\".to_string(),\n            email: \"sender@test.com\".to_string(),\n            password: \"hash\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n\n        let message = Message {\n            message_id: uuid::Uuid::new_v4().to_string(),\n            channel_id: \"ch1\".to_string(),\n            content: \"Hello World!\".to_string(),\n            user: user,\n            create_at: chrono::Utc::now().to_rfc3339(),\n        };\n\n        assert_eq!(message.content, \"Hello World!\");\n        assert!(!message.message_id.is_empty());\n    }\n\n    #[test]\n    fn test_message_content_validation() {\n        let content = \"Valid message\";\n        assert!(!content.is_empty());\n        assert!(content.len() \u003c= 2000);\n    }\n\n    #[test]\n    fn test_message_empty_content_allowed() {\n        let content = \"\";\n        // Empty messages can be presence indicators\n        assert_eq!(content.len(), 0);\n    }\n\n    #[test]\n    fn test_message_trim_whitespace() {\n        let content = \"  Hello  \".trim();\n        assert_eq!(content, \"Hello\");\n    }\n}\n\n// ═══════════════════════════════════════════════════════════════\n// TESTS USE CASE: MESSAGE DELETE\n// ═══════════════════════════════════════════════════════════════\n\n#[cfg(test)]\nmod message_delete_tests {\n    use super::*;\n\n    #[test]\n    fn test_message_delete_by_author() {\n        let author_id = \"user123\";\n        let user = User {\n            user_id: author_id.to_string(),\n            username: \"author\".to_string(),\n            email: \"author@test.com\".to_string(),\n            password: \"hash\".to_string(),\n            create_at: \"2024-01-01\".to_string(),\n            token: None,\n        };\n\n        let message (socket: WebSocket, channel_id: String, state: AppState) {\r\n    println!(\"🟢 WebSocket connecté pour channel: {}\", channel_id);\r\n\r\n    let (mut sender, mut receiver) = socket.split();\r\n\r\n    // Créer ou récupérer le broadcaster pour ce channel\r\n    let tx = {\r\n        let mut clients = state.clients.write().await;\r\n        clients\r\n            .entry(channel_id.clone())\r\n            .or_insert_with(|| tokio::sync::broadcast::channel(100).0)\r\n            .clone()\r\n    };\r\n\r\n    let mut rx = tx.subscribe();\r\n\r\n    // Variables partagées pour stocker l'identité de l'utilisateur\r\n    let current_user_id = Arc::new(RwLock::new(None::\u003cString\u003e));\r\n    let current_username = Arc::new(RwLock::new(None::\u003cString\u003e));\r\n\r\n    // Task pour envoyer les messages depuis le broadcast vers le WebSocket\r\n    let mut send_task = tokio::spawn(async move {\r\n        while let Ok(msg) = rx.recv().await {\r\n            if sender.send(Message::Text(msg)).await.is_err() {\r\n                break;\r\n            }\r\n        }\r\n    });\r\n\r\n    // Task pour recevoir les messages du WebSocket et les broadcaster\r\n    let tx_clone = tx.clone();\r\n    let channel_id_for_recv = channel_id.clone();\r\n    let user_id_clone = current_user_id.clone();\r\n    let username_clone = current_username.clone();\r\n    let mut recv_task = tokio::spawn(async move {\r\n        while let Some(Ok(msg)) = receiver.next().await {\r\n            match msg {\r\n                Message::Text(text) =\u003e {\r\n                    handle_text_message(\r\n                        \u0026text,\r\n                        \u0026tx_clone,\r\n                        \u0026channel_id_for_recv,\r\n                        \u0026user_id_clone,\r\n                        \u0026username_clone,\r\n                    )\r\n                    .await;\r\n                }\r\n                Message::Close(_) =\u003e {\r\n                    println!(\"🔴 Client a fermé la connexion pour channel: {}\", channel_id_for_recv);\r\n                    broadcast_user_left(\u0026tx_clone, \u0026user_id_clone, \u0026username_clone, \u0026channel_id_for_recv).await;\r\n                    break;\r\n                }\r\n                _ =\u003e {}\r\n            }\r\n        }\r\n    });\r\n\r\n    // Attendre que l'une des tasks se termine\r\n    tokio::select! {\r\n        _ = (\u0026mut send_task) =\u003e recv_task.abort(),\r\n        _ = (\u0026mut recv_task) =\u003e send_task.abort(),\r\n    }\r\n\r\n    // Broadcaster user_left à la déconnexion (si pas déjà fait)\r\n    broadcast_user_left(\u0026tx, \u0026current_user_id, \u0026current_username, \u0026channel_id).await;\r\n\r\n    println!(\"🔌 WebSocket déconnecté pour channel: {}\", channel_id);\r\n}\r\n\r\n/// Gérer un message texte reçu du WebSocket\r\nasync fn handle_text_message(\r\n    text: \u0026str,\r\n    tx: \u0026tokio::sync::broadcast::Sender\u003cString\u003e,\r\n    channel_id: \u0026str,\r\n    user_id: \u0026Arc\u003cRwLock\u003cOption\u003cString\u003e\u003e\u003e,\r\n    username: \u0026Arc\u003cRwLock\u003cOption\u003cString\u003e\u003e\u003e,\r\n) {\r\n    match serde_json::from_str::\u003cIncomingWsMessage\u003e(text) {\r\n        Ok(incoming_msg) =\u003e match incoming_msg {\r\n            IncomingWsMessage::NewMessage {\r\n                content,\r\n                user_id: uid,\r\n                username: uname,\r\n                server_id,\r\n                ..\r\n            } =\u003e {\r\n                handle_new_message(tx, channel_id, user_id, username, content, uid, uname, server_id).await;\r\n            }\r\n            IncomingWsMessage::Ping =\u003e {\r\n                send_pong(tx).await;\r\n            }\r\n            IncomingWsMessage::Typing {\r\n                user_id: uid,\r\n                username: uname,\r\n                channel_id: cid,\r\n            } =\u003e {\r\n                broadcast_typing(tx, uid, uname, cid).await;\r\n            }\r\n            _ =\u003e {\r\n                // Ignorer les autres types de messages (ex: Identify utilisé pour les WebSockets serveur)\r\n            }\r\n        },\r\n        Err(e) =\u003e {\r\n            eprintln!(\"❌ Erreur parsing message WebSocket: {} - Message: {}\", e, text);\r\n        }\r\n    }\r\n}\r\n\r\n/// Gérer un nouveau message\r\nasync fn handle_new_message(\r\n    tx: \u0026tokio::sync::broadcast::Sender\u003cString\u003e,\r\n    channel_id: \u0026str,\r\n    user_id_arc: \u0026Arc\u003cRwLock\u003cOption\u003cString\u003e\u003e\u003e,\r\n    username_arc: \u0026Arc\u003cRwLock\u003cOption\u003cString\u003e\u003e\u003e,\r\n    content: String,\r\n    user_id: String,\r\n    username: String,\r\n    server_id: Option\u003cString\u003e,\r\n) {\r\n    // Capturer l'identité de l'utilisateur au premier message\r\n    let is_first_message = {\r\n        let uid = user_id_arc.read().await;\r\n        uid.is_none()\r\n    };\r\n\r\n    if is_first_message {\r\n        *user_id_arc.write().await = Some(user_id.clone());\r\n        *username_arc.write().await = Some(username.clone());\r\n\r\n        // Broadcaster user_joined\r\n        if let Some(ref srv_id) = server_id {\r\n            let joined_msg = WsMessage::UserJoined {\r\n                user_id: user_id.clone(),\r\n                username: username.clone(),\r\n                server_id: srv_id.clone(),\r\n            };\r\n            if let Ok(json) = serde_json::to_string(\u0026joined_msg) {\r\n                let _ = tx.send(json);\r\n                println!(\"👤 User joined: {} ({})\", username, user_id);\r\n            }\r\n        }\r\n    }\r\n\r\n    // Ignorer les messages vides (messages de présence uniquement)\r\n    if content.trim().is_empty() {\r\n        println!(\"📡 Message de présence reçu (ignoré): {}\", username);\r\n        return;\r\n    }\r\n\r\n    // Sauvegarder le message en base de données\r\n    let message_result = tokio::task::spawn_blocking({\r\n        let channel_id = channel_id.to_string();\r\n        let content = content.clone();\r\n        let user_id = user_id.clone();\r\n        move || {\r\n            use crate::adapters::db::postgres_message_repository::PostgresMessageRepo;\r\n            use crate::adapters::db::postgres_user_repository::PostgresUserRepo;\r\n            use crate::domain::usecases::message::send_message::SendMessage;\r\n\r\n            let repo = PostgresMessageRepo;\r\n            let repo_user = PostgresUserRepo;\r\n            let use_case = SendMessage { repo_message: \u0026repo, repo_user: \u0026repo_user };\r\n            use_case.execute(channel_id, user_id, content)\r\n        }\r\n    })\r\n    .await;\r\n\r\n    match message_result {\r\n        Ok(Ok(saved_message)) =\u003e {\r\n            // Créer le message WS SORTANT avec les vraies données de la DB\r\n            let broadcast_msg = WsMessage::NewMessage {\r\n                message_id: saved_message.message_id,\r\n                content: saved_message.content,\r\n                user_id: saved_message.user.user_id,\r\n                username: saved_message.user.username,\r\n                channel_id: saved_message.channel_id,\r\n                create_at: saved_message.create_at,\r\n            };\r\n\r\n            // Broadcaster le message à tous les clients\r\n            if let Ok(json) = serde_json::to_string(\u0026broadcast_msg) {\r\n                let _ = tx.send(json);\r\n            }\r\n        }\r\n        Ok(Err(e)) =\u003e {\r\n            eprintln!(\"❌ Erreur sauvegarde message: {}\", e);\r\n        }\r\n        Err(e) =\u003e {\r\n            eprintln!(\"❌ Erreur task: {}\", e);\r\n        }\r\n    }\r\n}\r\n\r\n/// Envoyer un pong en réponse à un ping\r\nasync fn send_pong(tx: \u0026tokio::sync::broadcast::Sender\u003cString\u003e) {\r\n    let pong = WsMessage::Pong;\r\n    if let Ok(json) = serde_json::to_string(\u0026pong) {\r\n        let _ = tx.send(json);\r\n    }\r\n}\r\n\r\n/// Broadcaster un événement \"typing\"\r\nasync fn broadcast_typing(\r\n    tx: \u0026tokio::sync::broadcast::Sender\u003cString\u003e,\r\n    user_id: String,\r\n    username: String,\r\n    channel_id: String,\r\n) {\r\n    let typing_msg = WsMessage::Typing {\r\n        user_id,\r\n        username,\r\n        channel_id,\r\n    };\r\n    if let Ok(json) = serde_json::to_string(\u0026typing_msg) {\r\n        let _ = tx.send(json);\r\n    }\r\n}\r\n\r\n/// Broadcaster un événement user_left\r\nasync fn broadcast_user_left(\r\n    tx: \u0026tokio::sync::broadcast::Sender\u003cString\u003e,\r\n    user_id: \u0026Arc\u003cRwLock\u003cOption\u003cString\u003e\u003e\u003e,\r\n    username: \u0026Arc\u003cRwLock\u003cOption\u003cString\u003e\u003e\u003e,\r\n    channel_id: \u0026str,\r\n) {\r\n    let uid = user_id.read().await;\r\n    let uname = username.read().await;\r\n    if let (Some(user_id), Some(username)) = (uid.as_ref(), uname.as_ref()) {\r\n        let left_msg = WsMessage::UserLeft {\r\n            user_id: user_id.clone(),\r\n            username: username.clone(),\r\n            server_id: channel_id.to_string(),\r\n        };\r\n        if let Ok(json) = serde_json::to_string(\u0026left_msg) {\r\n            let _ = tx.send(json);\r\n            println!(\"👋 User left: {} ({})\", username, user_id);\r\n        }\r\n    }\r\n}\r\n","traces":[{"line":10,"address":[14348079,14348048],"length":1,"stats":{"Line":0}},{"line":11,"address":[11189170,11189332],"length":1,"stats":{"Line":0}},{"line":13,"address":[9650097],"length":1,"stats":{"Line":0}},{"line":17,"address":[11185793,11185711,11185940,11185358],"length":1,"stats":{"Line":0}},{"line":18,"address":[11132995,11133227,11133178],"length":1,"stats":{"Line":0}},{"line":19,"address":[11186258],"length":1,"stats":{"Line":0}},{"line":20,"address":[11140464,11140468,11133135],"length":1,"stats":{"Line":0}},{"line":24,"address":[11133373,11133257],"length":1,"stats":{"Line":0}},{"line":27,"address":[14512958,145130 s partagées pour stocker l'identité de l'utilisateur\r\n    let current_user_id = Arc::new(RwLock::new(None::\u003cString\u003e));\r\n    let current_username = Arc::new(RwLock::new(None::\u003cString\u003e));\r\n\r\n    // Task pour envoyer les messages depuis le broadcast vers le WebSocket\r\n    let mut send_task = tokio::spawn(async move {\r\n        while let Ok(msg) = rx.recv().await {\r\n            if sender.send(Message::Text(msg)).await.is_err() {\r\n                break;\r\n            }\r\n        }\r\n    });\r\n\r\n    // Task pour recevoir les messages du WebSocket\r\n    let tx_clone = tx.clone();\r\n    let user_id_clone = current_user_id.clone();\r\n    let username_clone = current_username.clone();\r\n    let server_id_clone = server_id.clone();\r\n    \r\n    let mut recv_task = tokio::spawn(async move {\r\n        while let Some(Ok(msg)) = receiver.next().await {\r\n            match msg {\r\n                Message::Text(text) =\u003e {\r\n                    // Gérer les messages entrants\r\n                    if let Ok(incoming_msg) = serde_json::from_str::\u003cIncomingWsMessage\u003e(\u0026text) {\r\n                        match incoming_msg {\r\n                            IncomingWsMessage::Identify { user_id, username } =\u003e {\r\n                                // Stocker l'identité de l'utilisateur\r\n                                *user_id_clone.write().await = Some(user_id.clone());\r\n                                *username_clone.write().await = Some(username.clone());\r\n                                \r\n                                println!(\"👤 Utilisateur identifié: {} ({})\", username, user_id);\r\n                                \r\n                                // Broadcaster user_online\r\n                                let online_msg = WsMessage::UserOnline {\r\n                                    user_id: user_id.clone(),\r\n                                    username: username.clone(),\r\n                                    server_id: server_id_clone.clone(),\r\n                                };\r\n                                if let Ok(json) = serde_json::to_string(\u0026online_msg) {\r\n                                    let _ = tx_clone.send(json);\r\n                                }\r\n                            }\r\n                            IncomingWsMessage::Ping =\u003e {\r\n                                let pong = WsMessage::Pong;\r\n                                if let Ok(json) = serde_json::to_string(\u0026pong) {\r\n                                    let _ = tx_clone.send(json);\r\n                                }\r\n                            }\r\n                            _ =\u003e {}\r\n                        }\r\n                    }\r\n                }\r\n                Message::Close(_) =\u003e {\r\n                    println!(\"🔴 Client a fermé la connexion pour serveur: {}\", server_key);\r\n                    break;\r\n                }\r\n                _ =\u003e {}\r\n            }\r\n        }\r\n    });\r\n\r\n    // Attendre que l'une des tasks se termine\r\n    tokio::select! {\r\n        _ = (\u0026mut send_task) =\u003e recv_task.abort(),\r\n        _ = (\u0026mut recv_task) =\u003e send_task.abort(),\r\n    }\r\n\r\n    // Broadcaster user_offline à la déconnexion\r\n    let uid = current_user_id.read().await;\r\n    let uname = current_username.read().await;\r\n    if let (Some(user_id), Some(username)) = (uid.as_ref(), uname.as_ref()) {\r\n        let offline_msg = WsMessage::UserOffline {\r\n            user_id: user_id.clone(),\r\n            username: username.clone(),\r\n            server_id: server_id.clone(),\r\n        };\r\n        if let Ok(json) = serde_json::to_string(\u0026offline_msg) {\r\n            let _ = tx.send(json);\r\n            println!(\"👋 Utilisateur déconnecté: {} ({})\", username, user_id);\r\n        }\r\n    }\r\n\r\n    println!(\"🔌 WebSocket déconnecté pour serveur: {}\", server_id);\r\n}\r\n","traces":[{"line":10,"address":[11151440,11151471],"length":1,"stats":{"Line":0}},{"line":11,"address":[14243572,14243385],"length":1,"stats":{"Line":0}},{"line":13,"address":[10917297],"length":1,"stats":{"Line":0}},{"line":16,"address":[10917540,10917451],"length":1,"stats":{"Line":0}},{"line":18,"address":[9130076],"length":1,"stats":{"Line":0}},{"line":19,"address":[10864962,10865194,10865145],"length":1,"stats":{"Line":0}},{"line":20,"address":[10865041],"length":1,"stats":{"Line":0}},{"line":21,"address":[10932084,10918286,10932080],"length":1,"stats":{"Line":0}},{"line":25,"address":[10865224,10865340],"length":1,"stats":{"Line":0}},{"line":28,"address":[14244925,14245023],"length":1,"stats":{"Line":0}},{"line":29,"address":[10865642,10865541],"length":1,"stats":{"Line":0}},{"line":32,"address":[14250949,14245262,14251868,14250841,14251935,14250937,14250909,14250816,14245484],"length":1,"stats":{"Line":0}},{"line":33,"address":[10871378,10871334,10871428,10871823,10871878],"length":1,"stats":{"Line":0}},{"line":34,"address":[9096144],"length":1,"stats":{"Line":0}},{"line":41,"address":[14245487,14245587],"length":1,"stats":{"Line":0}},{"line":42,"address":[14245602,14245699],"length":1,"stats":{"Line":0}},{"line":43,"address":[14245811,14245714],"length":1,"stats":{"Line":0}},{"line":44,"address":[11223270],"length":1,"stats":{"Line":0}},{"line":46,"address":[10925810,10925776,10931622,10925828,10925883,10925695,10925664,10919540,10927358],"length":1,"stats":{"Line":0}},{"line":47,"address":[14252225,14252168,14252120,14254679,14252285,14254781],"length":1,"stats":{"Line":0}},{"line":48,"address":[10928800],"length":1,"stats":{"Line":0}},{"line":49,"address":[14255246],"length":1,"stats":{"Line":0}},{"line":51,"address":[10875806,10875729],"length":1,"stats":{"Line":0}},{"line":52,"address":[10381628],"length":1,"stats":{"Line":0}},{"line":53,"address":[11231708],"length":1,"stats":{"Line":0}},{"line":55,"address":[14255677,14252186,14252322,1 itory;\r\n    use crate::domain::usecases::channel::{\r\n        create::CreateChannel,\r\n        delete::DeleteChannel,\r\n        get::GetChannelDetails,\r\n        list_channel::ListServerChannel,\r\n        update::UpdateChannel,\r\n    };\r\n    use std::collections::HashMap;\r\n    use std::sync::{Arc, Mutex};\r\n\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    #[test]\r\n    fn test_create_channel() {\r\n        let repo = MockChannelRepository::new();\r\n        let use_case = CreateChannel { repo: \u0026repo };\r\n\r\n        let result = use_case.execute(\r\n            \"general\".to_string(),\r\n            \"server-123\".to_string(),\r\n        );\r\n\r\n        assert!(result.is_ok());\r\n        let channel = result.unwrap();\r\n        assert_eq!(channel.name, \"general\");\r\n        assert_eq!(channel.server_id, \"server-123\");\r\n    }\r\n    #[test]\r\n    fn test_create_channel_empty() {\r\n        let repo = MockChannelRepository::new();\r\n        let use_case = CreateChannel { repo: \u0026repo };\r\n\r\n        let result = use_case.execute(\"\".to_string(), \"\".to_string());\r\n\r\n        assert!(result.is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn test_get_channel() {\r\n        let repo = MockChannelRepository::new();\r\n        let channel = Channel {\r\n            channel_id: \"channel-123\".to_string(),\r\n            create_at: \"2024-01-01\".to_string(),\r\n            name: \"general\".to_string(),\r\n            server_id: \"server-123\".to_string(),\r\n        };\r\n        repo.add_channel(channel.clone());\r\n\r\n        let use_case = GetChannelDetails { repo: \u0026repo };\r\n        let result = use_case.execute(\"channel-123\".to_string());\r\n\r\n        assert!(result.is_ok());\r\n        let found_channel = result.unwrap();\r\n        assert_eq!(found_channel.channel_id, \"channel-123\");\r\n        assert_eq!(found_channel.name, \"general\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_get_channel_empty() {\r\n        let repo = MockChannelRepository::new();\r\n        let use_case = GetChannelDetails { repo: \u0026repo };\r\n\r\n        let result = use_case.execute(\"\".to_string());\r\n\r\n        assert!(result.is_err());\r\n        assert_eq!(result.unwrap_err(), \"Evoyer un id valide\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_get_channel_not_found() {\r\n        let repo = MockChannelRepository::new();\r\n        let use_case = GetChannelDetails { repo: \u0026repo };\r\n\r\n        let result = use_case.execute(\"non-existent-id\".to_string());\r\n\r\n        assert!(result.is_err());\r\n        assert_eq!(result.unwrap_err(), \"Channel not found\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_get_server_channels() {\r\n        let repo = MockChannelRepository::new();\r\n        \r\n        repo.add_channel(Channel {\r\n            channel_id: \"channel-1\".to_string(),\r\n            create_at: \"2024-01-01\".to_string(),\r\n            name: \"general\".to_string(),\r\n            server_id: \"server-123\".to_string(),\r\n        });      \r\n        repo.add_channel(Channel {\r\n            channel_id: \"channel-2\".to_string(),\r\n            create_at: \"2024-01-02\".to_string(),\r\n            name: \"random\".to_string(),\r\n            server_id: \"server-123\".to_string(),\r\n        });\r\n\r\n        repo.add_channel(Channel {\r\n            channel_id: \"channel-3\".to_string(),\r\n            create_at: \"2024-01-03\".to_string(),\r\n            name: \"other\".to_string(),\r\n            server_id: \"server-456\".to_string(),\r\n        });\r\n\r\n        let use_case = ListServerChannel { repo: \u0026repo };\r\n        let result = use_case.execute(\"server-123\".to_string());\r\n\r\n        assert!(result.is_ok());\r\n        let channels = result.unwrap();\r\n        assert_eq!(channels.len(), 2);\r\n        assert!(channels.iter().all(|c| c.server_id == \"server-123\"));\r\n    }\r\n\r\n    #[test]\r\n    fn test_get_server_channels_e
