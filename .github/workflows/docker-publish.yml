name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: epitechmscpropromo2028/t-dev-600-nan_6-backend
  IMAGE_FRONTEND: epitechmscpropromo2028/t-dev-600-nan_6-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        working-directory: ./backend
        run: cargo test --verbose

  build-backend:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Log into registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Log into registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  mirror:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Mirror to other repo
        run: |
          git push --mirror https://github.com/molomox/LINKIT.git

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, mirror]
    if: github.event_name != 'pull_request'
    steps:
      - name: Deploy backend on Dokploy
        run: |
          curl -X POST "${{ secrets.DOKPLOY_URL }}/api/application.redeploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_BACKEND_ID }}"}'

      - name: Deploy frontend on Dokploy
        run: |
          curl -X POST "${{ secrets.DOKPLOY_URL }}/api/application.redeploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_FRONTEND_ID }}"}'
      
      - name: Reconnect containers to app-network
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.224.236.78
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 15
            for container in $(docker ps --format "{{.Names}}" | grep -E "linkyt|pgadmin"); do
              docker network connect app-network $container 2>/dev/null || true
            done